<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&amp;display=swap');
            .logo-text {
                font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
                font-weight: 700;
                font-size: 42px;
                fill: #FFFFFF;
                text-anchor: middle;
                letter-spacing: -0.5px;
            }
        </style>
        <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#CA5345" />
            <stop offset="100%" stop-color="#852C25" />
        </linearGradient>
    </defs>
    
    <!-- Background Circle -->
    <circle cx="150" cy="150" r="150" fill="url(#bg-gradient)" />
    
    <!-- Icon Group -->
    <g transform="translate(50, 45)" stroke="#FFFFFF" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <!-- Headphone Band -->
        <path d="M20,70 C20,20 50,-5 100,-5 C150,-5 180,20 180,70" stroke-width="8" />
        
        <!-- Earcups -->
        <rect x="10" y="65" width="20" height="40" rx="10" fill="#FFFFFF" stroke="none" />
        <rect x="170" y="65" width="20" height="40" rx="10" fill="#FFFFFF" stroke="none" />
        
        <!-- Microphone Capsule -->
        <rect x="88" y="25" width="24" height="45" rx="12" stroke-width="6" />
        
        <!-- Microphone Curve/Stand -->
        <path d="M65,55 C65,90 80,100 100,100 C120,100 135,90 135,55" stroke-width="6" />
        <line x1="100" y1="100" x2="100" y2="120" stroke-width="6" />
        <line x1="85" y1="120" x2="115" y2="120" stroke-width="6" />
    </g>
    
    <!-- Logo Text -->
    <text x="150" y="240" class="logo-text">MinLish</text>
</svg>